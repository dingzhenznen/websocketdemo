<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>node-term-ws demo</title>
    <link rel="stylesheet" href="/vendor/xterm-css/xterm.css" />
    <style>
      :root {
        --bg: #08111f;
        --panel: rgba(3, 10, 24, 0.82);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --warn: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.15), transparent 28rem),
          radial-gradient(circle at 100% 0, rgba(245, 158, 11, 0.12), transparent 22rem),
          linear-gradient(180deg, #020617 0%, #08111f 45%, #0f172a 100%);
        color: var(--text);
        font-family: Menlo, Monaco, Consolas, monospace;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 24px auto;
      }

      .header {
        margin-bottom: 16px;
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .header p {
        margin: 0;
        color: var(--muted);
      }

      .shell {
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 17, 31, 0.94);
      }

      .lights {
        display: flex;
        gap: 8px;
      }

      .light {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .light.red { background: #ef4444; }
      .light.yellow { background: #f59e0b; }
      .light.blue { background: #38bdf8; }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      #terminal {
        height: 70vh;
        padding: 12px;
      }

      @media (max-width: 720px) {
        .page {
          width: calc(100vw - 20px);
          margin: 10px auto;
        }

        #terminal {
          height: 78vh;
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>node-term-ws demo</h1>
        <p>xterm.js UI over WebSocket. Each submitted line runs as a separate child process command.</p>
      </header>

      <section class="shell">
        <div class="toolbar">
          <div class="lights">
            <span class="light red"></span>
            <span class="light yellow"></span>
            <span class="light blue"></span>
          </div>
          <div class="status" id="status">connecting</div>
        </div>
        <div id="terminal"></div>
      </section>
    </main>

    <script src="/vendor/xterm/xterm.js"></script>
    <script src="/vendor/xterm-addon-fit/addon-fit.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const term = new Terminal({
        cursorBlink: true,
        theme: {
          background: '#020617',
          foreground: '#e2e8f0',
          cursor: '#38bdf8',
          black: '#020617',
          brightBlack: '#475569',
          yellow: '#f59e0b',
          brightBlue: '#7dd3fc'
        }
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal'));
      fitAddon.fit();

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${location.host}/ws`);
      let inputBuffer = '';
      let promptVisible = false;
      let busy = false;

      function writePrompt() {
        promptVisible = true;
        term.write('\r\n$ ');
      }

      function resetInput() {
        inputBuffer = '';
      }

      ws.addEventListener('open', () => {
        statusEl.textContent = 'connected';
      });

      ws.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);

        if (message.type === 'ready') {
          term.writeln(`Connected: ${message.mode}`);
          term.writeln(`cwd: ${message.cwd}`);
          term.writeln(message.note);
          return;
        }

        if (message.type === 'prompt') {
          busy = false;
          resetInput();
          writePrompt();
          return;
        }

        if (message.type === 'started') {
          busy = true;
          promptVisible = false;
          term.writeln('');
          term.writeln(`[run] ${message.command}`);
          return;
        }

        if (message.type === 'stdout' || message.type === 'stderr') {
          term.write(message.data);
          return;
        }

        if (message.type === 'exit') {
          term.writeln(`\r\n[exit] code=${message.code} signal=${message.signal ?? 'null'}`);
        }
      });

      ws.addEventListener('close', () => {
        statusEl.textContent = 'closed';
        busy = false;
        term.writeln('\r\n[connection closed]');
      });

      term.onData((data) => {
        if (ws.readyState !== WebSocket.OPEN) {
          return;
        }

        if (busy) {
          if (data === '\u0003') {
            ws.send(JSON.stringify({ type: 'stop' }));
          }
          return;
        }

        if (!promptVisible) {
          return;
        }

        if (data === '\r') {
          ws.send(JSON.stringify({ type: 'run', command: inputBuffer }));
          return;
        }

        if (data === '\u007f') {
          if (inputBuffer.length > 0) {
            inputBuffer = inputBuffer.slice(0, -1);
            term.write('\b \b');
          }
          return;
        }

        if (data === '\u0003') {
          resetInput();
          term.write('^C');
          writePrompt();
          return;
        }

        if (data >= ' ') {
          inputBuffer += data;
          term.write(data);
        }
      });

      window.addEventListener('resize', () => {
        fitAddon.fit();
      });
    </script>
  </body>
</html>
