<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>node-pty web terminal</title>
    <link rel="stylesheet" href="/vendor/xterm-css/xterm.css" />
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --line: #334155;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 24rem),
          linear-gradient(180deg, #020617, #0f172a 40%, #111827);
        color: var(--text);
        font-family: Menlo, Monaco, Consolas, monospace;
      }

      .layout {
        width: min(1100px, calc(100vw - 32px));
        margin: 24px auto;
      }

      .header {
        margin-bottom: 16px;
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .header p {
        margin: 0;
        color: var(--muted);
      }

      .terminal-shell {
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        background: rgba(2, 6, 23, 0.72);
        backdrop-filter: blur(10px);
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(15, 23, 42, 0.94);
      }

      .lights {
        display: flex;
        gap: 8px;
      }

      .light {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .light.red { background: #ef4444; }
      .light.yellow { background: #f59e0b; }
      .light.green { background: #22c55e; }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      #terminal {
        height: 70vh;
        padding: 12px;
      }

      @media (max-width: 720px) {
        .layout {
          width: calc(100vw - 20px);
          margin: 10px auto;
        }

        #terminal {
          height: 78vh;
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <h1>node-pty web terminal</h1>
        <p>Browser terminal over WebSocket backed by a local PTY.</p>
      </header>

      <section class="terminal-shell">
        <div class="toolbar">
          <div class="lights">
            <span class="light red"></span>
            <span class="light yellow"></span>
            <span class="light green"></span>
          </div>
          <div class="status" id="status">connecting</div>
        </div>
        <div id="terminal"></div>
      </section>
    </main>

    <script src="/vendor/xterm/xterm.js"></script>
    <script src="/vendor/xterm-addon-fit/addon-fit.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const term = new Terminal({
        cursorBlink: true,
        theme: {
          background: '#020617',
          foreground: '#e5e7eb',
          cursor: '#22c55e',
          black: '#020617',
          brightBlack: '#475569',
          green: '#22c55e',
          brightGreen: '#4ade80'
        }
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal'));
      fitAddon.fit();

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${location.host}/ws`);

      ws.addEventListener('open', () => {
        statusEl.textContent = 'connected';
        fitAddon.fit();
        ws.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows
        }));
      });

      ws.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);
        if (message.type === 'ready') {
          term.writeln(`Connected to ${message.shell}`);
          return;
        }
        if (message.type === 'output') {
          term.write(message.data);
          return;
        }
        if (message.type === 'exit') {
          term.writeln(`\r\n[process exited code=${message.exitCode}]`);
          statusEl.textContent = 'closed';
        }
      });

      ws.addEventListener('close', () => {
        statusEl.textContent = 'closed';
      });

      term.onData((data) => {
        ws.send(JSON.stringify({ type: 'input', data }));
      });

      window.addEventListener('resize', () => {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'resize',
            cols: term.cols,
            rows: term.rows
          }));
        }
      });
    </script>
  </body>
</html>
