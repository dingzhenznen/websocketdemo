<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Exec Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2d2d2d;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e3e;
        }
        .header h1 {
            font-size: 18px;
            color: #fff;
        }
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }
        .status.connected {
            background: #2ea043;
            color: #fff;
        }
        .status.disconnected {
            background: #da3633;
            color: #fff;
        }
        .status.connecting {
            background: #d29922;
            color: #000;
        }
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e3e;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-size: 12px;
            color: #9cdcfe;
            text-transform: uppercase;
        }
        .input-group input {
            background: #3c3c3c;
            border: 1px solid #3e3e3e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .input-group input:focus {
            outline: none;
            border-color: #007acc;
        }
        .btn {
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1177bb;
        }
        .btn:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }
        .quick-commands {
            margin-top: 10px;
        }
        .quick-commands h3 {
            font-size: 12px;
            color: #9cdcfe;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .quick-btn {
            display: block;
            width: 100%;
            background: #3c3c3c;
            border: 1px solid #3e3e3e;
            color: #d4d4d4;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .quick-btn:hover {
            background: #4c4c4c;
            border-color: #007acc;
        }
        .terminal {
            flex: 1;
            background: #1e1e1e;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .terminal-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-line.stdout {
            color: #d4d4d4;
        }
        .terminal-line.stderr {
            color: #f48771;
        }
        .terminal-line.system {
            color: #858585;
            font-style: italic;
        }
        .terminal-line.error {
            color: #da3633;
        }
        .terminal-line.success {
            color: #2ea043;
        }
        .terminal-line.command {
            color: #9cdcfe;
            border-left: 3px solid #007acc;
            padding-left: 10px;
            margin: 10px 0;
        }
        .terminal-line.status {
            color: #d29922;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔌 WebSocket Exec Client</h1>
        <span id="status" class="status disconnected">未连接</span>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="input-group">
                <label>WebSocket 地址</label>
                <input type="text" id="wsUrl" value="ws://localhost:3000" placeholder="ws://localhost:3000">
            </div>
            <button class="btn" id="connectBtn" onclick="toggleConnection()">连接</button>

            <div class="input-group">
                <label>执行命令</label>
                <input type="text" id="command" placeholder="输入命令，如: ls -la" onkeypress="handleKeyPress(event)">
            </div>
            <button class="btn" id="execBtn" onclick="executeCommand()" disabled>执行</button>

            <div class="quick-commands">
                <h3>快速命令</h3>
                <button class="quick-btn" onclick="setCommand('ls -la')">ls -la</button>
                <button class="quick-btn" onclick="setCommand('pwd')">pwd</button>
                <button class="quick-btn" onclick="setCommand('date')">date</button>
                <button class="quick-btn" onclick="setCommand('whoami')">whoami</button>
                <button class="quick-btn" onclick="setCommand('ps aux')">ps aux</button>
                <button class="quick-btn" onclick="setCommand('df -h')">df -h</button>
            </div>
        </div>
        <div class="terminal" id="terminal"></div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;

        function getElement(id) {
            return document.getElementById(id);
        }

        function updateStatus(status, text) {
            const statusEl = getElement('status');
            statusEl.className = 'status ' + status;
            statusEl.textContent = text;
        }

        function appendLine(text, type = 'system') {
            const terminal = getElement('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line ' + type;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const url = getElement('wsUrl').value;
            updateStatus('connecting', '连接中...');
            appendLine(`正在连接到 ${url}...`, 'system');

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    isConnected = true;
                    updateStatus('connected', '已连接');
                    getElement('connectBtn').textContent = '断开';
                    getElement('execBtn').disabled = false;
                    appendLine('WebSocket 连接成功', 'success');
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                };

                ws.onclose = () => {
                    isConnected = false;
                    updateStatus('disconnected', '未连接');
                    getElement('connectBtn').textContent = '连接';
                    getElement('execBtn').disabled = true;
                    appendLine('WebSocket 连接已关闭', 'system');
                    ws = null;
                };

                ws.onerror = (error) => {
                    appendLine('WebSocket 错误: ' + error.message, 'error');
                };
            } catch (e) {
                appendLine('连接失败: ' + e.message, 'error');
                updateStatus('disconnected', '未连接');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'connected':
                    appendLine(msg.message, 'system');
                    break;
                case 'status':
                    appendLine(msg.message, 'status');
                    break;
                case 'stdout':
                    appendLine(msg.data, 'stdout');
                    break;
                case 'stderr':
                    appendLine(msg.data, 'stderr');
                    break;
                case 'completed':
                    appendLine(`✓ ${msg.message}`, 'success');
                    appendLine('', 'system');
                    break;
                case 'error':
                    appendLine('✗ ' + msg.message, 'error');
                    break;
                default:
                    appendLine(JSON.stringify(msg), 'system');
            }
        }

        function executeCommand() {
            if (!isConnected || !ws) {
                appendLine('请先连接 WebSocket', 'error');
                return;
            }

            const command = getElement('command').value.trim();
            if (!command) {
                appendLine('请输入命令', 'error');
                return;
            }

            appendLine(`$ ${command}`, 'command');

            ws.send(JSON.stringify({
                type: 'exec',
                command: command
            }));
        }

        function setCommand(cmd) {
            getElement('command').value = cmd;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                executeCommand();
            }
        }

        // 页面加载时自动连接
        window.onload = () => {
            appendLine('WebSocket Exec Client 已加载', 'system');
            appendLine('点击"连接"按钮连接到服务器', 'system');
            appendLine('', 'system');
        };
    </script>
</body>
</html>
